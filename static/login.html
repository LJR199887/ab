<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b0d14;
            --panel: #151925;
            --border: #2a3142;
            --text: #eef2ff;
            --muted: #99a2b5;
            --accent: #7c5cff;
            --accent-2: #5fdaff;
            --danger: #ff6b7a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(124, 92, 255, 0.16), transparent 35%),
                radial-gradient(circle at bottom, rgba(95, 218, 255, 0.10), transparent 30%),
                var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .panel {
            width: min(92vw, 380px);
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(21, 25, 37, 0.92);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }
        p {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--muted);
        }
        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #0f1320;
            color: var(--text);
            padding: 14px 14px;
            font-size: 15px;
            outline: none;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.18);
        }
        button {
            width: 100%;
            margin-top: 8px;
            padding: 14px 16px;
            border: 0;
            border-radius: 12px;
            color: white;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }
        .error {
            min-height: 20px;
            margin-top: 14px;
            color: var(--danger);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <form class="panel" id="login-form">
        <h1>管理员登录</h1>
        <p>请输入管理员账号和密码后继续操作。</p>
        <div class="field">
            <label for="username">管理员账号</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
        </div>
        <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" id="submit-btn">进入系统</button>
        <div class="error" id="error-msg"></div>
    </form>

    <script>
        const form = document.getElementById("login-form");
        const submitBtn = document.getElementById("submit-btn");
        const errorMsg = document.getElementById("error-msg");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            errorMsg.textContent = "";
            submitBtn.disabled = true;
            submitBtn.textContent = "登录中...";

            const payload = {
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value
            };

            try {
                const response = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.message || "登录失败");
                }
                window.location.href = "/";
            } catch (error) {
                errorMsg.textContent = error.message || "登录失败";
                submitBtn.disabled = false;
                submitBtn.textContent = "进入系统";
            }
        });
    </script>
</body>
</html>
